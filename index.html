<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Coffe | Live Ordering</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <link rel="apple-touch-icon" href="71795.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); }
        .modal-content { background-color: #0a0a0a; margin: 10% auto; padding: 25px; border: 1px solid #dc2626; width: 90%; max-width: 450px; border-radius: 25px; }
        .waafi-btn { background: linear-gradient(90deg, #10b981 0%, #059669 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans pb-24">

    <!-- Header -->
    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-40 border-b border-zinc-900">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black italic shadow-lg shadow-red-600/20">SC</div>
            <h1 class="text-lg font-black tracking-tighter">SC COFFE</h1>
        </div>
        <div class="flex gap-4 items-center">
            <span class="bg-zinc-900 px-3 py-1 rounded-full text-[10px] border border-zinc-800 text-zinc-400">
                <i class="fas fa-star text-yellow-500 mr-1"></i> 120 Pts
            </span>
        </div>
    </header>

    <!-- Menu Section -->
    <main class="px-6 py-6">
        <h2 class="text-lg font-bold mb-6 text-zinc-400 uppercase tracking-widest text-xs">Menu-ga shaqaynaya (Live)</h2>
        
        <div class="space-y-4">
            <!-- Espresso -->
            <div onclick="openM('Espresso', 'Digir saafi ah.', 'Focus-ka ayuu kordhiyaa.', '$1.50')" class="glass p-4 rounded-2xl flex items-center gap-4 cursor-pointer">
                <div class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center">☕</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm">Espresso</h4>
                    <p class="text-[10px] text-zinc-500">$1.50</p>
                </div>
                <button class="bg-red-600/20 text-red-500 px-4 py-2 rounded-lg text-[10px] font-bold">DALBO</button>
            </div>

            <!-- Iced Spanish -->
            <div onclick="openM('Iced Spanish Latte', 'Caano & espresso baraf leh.', 'Stress-ka ayuu dilaa.', '$3.50')" class="glass p-4 rounded-2xl flex items-center gap-4 cursor-pointer">
                <div class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center">🧊</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm">Iced Spanish</h4>
                    <p class="text-[10px] text-zinc-500">$3.50</p>
                </div>
                <button class="bg-red-600/20 text-red-500 px-4 py-2 rounded-lg text-[10px] font-bold">DALBO</button>
            </div>
        </div>
    </main>

    <!-- Modal (Halkan ayaa laga dalbanayaa) -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h4 id="mT" class="text-xl font-black mb-2 text-center uppercase"></h4>
            <p id="mB" class="text-zinc-500 text-xs text-center mb-6"></p>
            
            <div class="bg-zinc-900 p-4 rounded-2xl mb-6">
                <p class="text-[10px] text-red-500 font-bold uppercase mb-1">Qiimaha</p>
                <p id="mQ" class="text-xl font-black text-white"></p>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="dalboWhatsApp()" class="waafi-btn w-full py-4 rounded-xl font-bold text-sm uppercase flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> Ku bixi WAAFI / WhatsApp
                </button>
                <button onclick="closeM()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold text-[10px] text-zinc-500">JOOJI</button>
            </div>
        </div>
    </div>

    <script>
        let currentItem = "";
        let currentPrice = "";

        function openM(t, b, f, q) {
            currentItem = t;
            currentPrice = q;
            document.getElementById('mT').innerText = t;
            document.getElementById('mB').innerText = b + " " + f;
            document.getElementById('mQ').innerText = q;
            document.getElementById('modal').style.display = "block";
        }

        function closeM() {
            document.getElementById('modal').style.display = "none";
        }

        function dalboWhatsApp() {
            // LAMBARKAAGA WHATSAPP-KA
            const lambarka = "252614909575"; 
            
            const fariin = `*DALAB CUSUB (SC COFFE)*
--------------------------
☕ *Coffee:* ${currentItem}
💰 *Qiimaha:* ${currentPrice}
💳 *Bixinta:* WAAFI / EVC Plus
--------------------------
Fadlan iigu soo diyaariya!`;

            const url = `https://wa.me/${lambarka}?text=${encodeURIComponent(fariin)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
