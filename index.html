<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Coffe | 10 Items Menu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <link rel="apple-touch-icon" href="71795.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); }
        .modal-content { background-color: #0a0a0a; margin: 10% auto; padding: 25px; border: 1px solid #dc2626; width: 90%; max-width: 450px; border-radius: 25px; }
        .waafi-btn { background: linear-gradient(90deg, #10b981 0%, #059669 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans pb-24">

    <!-- Header -->
    <header class="p-5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-40 border-b border-zinc-900">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black italic shadow-lg shadow-red-600/20">SC</div>
            <div>
                <h1 class="text-lg font-black tracking-tighter">SC COFFE</h1>
                <p class="text-[8px] text-red-500 font-bold tracking-[0.2em]">MOGADISHU HUB</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <span class="bg-zinc-900 px-3 py-1 rounded-full text-[10px] border border-zinc-800 text-zinc-400">
                <i class="fas fa-star text-yellow-500 mr-1"></i> <span id="user-pts">120</span> Pts
            </span>
        </div>
    </header>

    <!-- Wallet & Loyalty -->
    <section class="p-6">
        <div class="glass p-5 rounded-[2rem] border-t border-white/10 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-xs text-zinc-500 font-bold uppercase mb-1 text-center">Xubinnimada SC</p>
                <h2 class="text-3xl font-black mb-4 text-center"><span id="cup-count">4</span> <span class="text-sm font-normal text-zinc-500">/ 5 Koob</span></h2>
                <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-red-600 h-full w-[80%]"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Menu Section (10 Items) -->
    <main class="px-6">
        <h2 class="text-lg font-bold mb-6">Menu-ga Dhammaystiran (10 Nooc)</h2>
        <div id="menu-container" class="space-y-4">
            <!-- JavaScript ayaa halkan ku shubi doona 10-ka xabo si koodhka uusan u noqon mid aad u dheer -->
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content text-center">
            <div class="w-16 h-16 bg-red-600/10 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-coffee"></i>
            </div>
            <h4 id="mT" class="text-xl font-black mb-2 uppercase"></h4>
            <div class="bg-zinc-900 p-4 rounded-2xl mb-6">
                <p id="mF" class="text-sm italic text-zinc-400 mb-2"></p>
                <p id="mP" class="text-lg font-black text-red-500"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="closeM()" class="flex-1 bg-zinc-800 py-3 rounded-xl font-bold text-xs">XIR</button>
                <button onclick="executeOrder()" class="flex-[2] waafi-btn py-3 rounded-xl font-bold text-xs uppercase">Ku bixi WAAFI</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-6 left-6 right-6 glass border border-white/10 p-4 rounded-[2rem] flex justify-around items-center z-50">
        <i class="fas fa-home text-red-600"></i>
        <i class="fas fa-search text-zinc-600"></i>
        <div class="bg-red-600 w-12 h-12 rounded-full flex items-center justify-center -mt-12 border-4 border-[#050505]">
            <i class="fas fa-qrcode text-white"></i>
        </div>
        <i class="fas fa-heart text-zinc-600"></i>
        <i class="fas fa-cog text-zinc-600"></i>
    </nav>

    <script>
        const CONTACT_WA = "252614909575";
        let selectedItem = {};

        const items = [
            { t: 'Iced Spanish Latte', b: 'Condensed milk & espresso.', p: '$3.50', e: '🧊', f: 'Wuxuu dejiyaa stress-ka.' },
            { t: 'Caramel Macchiato', b: 'Vanilla & caramel latte.', p: '$3.50', e: '🍯', f: 'Wuxuu kiciyaa farxadda.' },
            { t: 'Double Espresso', b: 'Strong & pure coffee shot.', p: '$2.00', e: '☕', f: 'Tamarta maskaxda ayuu kordhiyaa.' },
            { t: 'Cappuccino', b: 'Espresso with foamy milk.', p: '$3.00', e: '☁️', f: 'Dhadhan macaan oo degan.' },
            { t: 'Caffe Latte', b: 'Smooth steamed milk coffee.', p: '$3.00', e: '🥛', f: 'Wuxuu ku haboon yahay subaxda.' },
            { t: 'Americano', b: 'Espresso with hot water.', p: '$2.50', e: '⚫', f: 'Wuxuu ka hortagaa caajiska.' },
            { t: 'Mocha Coffee', b: 'Chocolate & coffee blend.', p: '$3.75', e: '🍫', f: 'Wuxuu wanaajiya mood-ka.' },
            { t: 'Flat White', b: 'Velvety microfoam milk.', p: '$3.25', e: '⚪', f: 'Dhadhan heer sare ah.' },
            { t: 'Iced Americano', b: 'Cold water & espresso.', p: '$2.50', e: '❄️', f: 'Wuxuu ku qaboojiyaa kulaylka.' },
            { t: 'Vanilla Latte', b: 'Sweet vanilla coffee.', p: '$3.50', e: '🍦', f: 'Dhadhan aad u macaan.' }
        ];

        function loadMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div onclick="openM('${item.t}', '${item.f}', '${item.p}')" class="glass p-4 rounded-2xl flex items-center gap-4 cursor-pointer active:scale-95 transition-transform">
                    <div class="w-14 h-14 bg-zinc-900 rounded-xl flex items-center justify-center text-xl">${item.e}</div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${item.t}</h4>
                        <p class="text-[10px] text-zinc-500">${item.b}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-red-500 text-sm">${item.p}</p>
                        <button class="text-[8px] bg-red-600/10 text-red-500 px-2 py-1 rounded-md mt-1 font-bold italic">SELECT</button>
                    </div>
                </div>
            `).join('');
        }

        function openM(t, f, p) {
            selectedItem = {name: t, price: p};
            document.getElementById('mT').innerText = t;
            document.getElementById('mF').innerText = f;
            document.getElementById('mP').innerText = p;
            document.getElementById('modal').style.display = "block";
        }

        function closeM() { document.getElementById('modal').style.display = "none"; }

        function executeOrder() {
            const msg = `*DALAB CUSUB: SC COFFE*%0A-----------------%0A*Alaabta:* ${selectedItem.name}%0A*Qiimaha:* ${selectedItem.price}%0A*Bixinta:* WAAFI/EVC Plus%0A-----------------%0AFadlan ii soo diyaari!`;
            window.open(`https://wa.me/${CONTACT_WA}?text=${msg}`, '_blank');
            closeM();
        }

        loadMenu();
    </script>
</body>
</html>
