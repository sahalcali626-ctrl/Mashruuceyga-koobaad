<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Coffe | App Dhammaystiran</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <link rel="apple-touch-icon" href="71795.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); }
        .modal-content { background-color: #0a0a0a; margin: 15% auto; padding: 25px; border: 1px solid #dc2626; width: 90%; max-width: 400px; border-radius: 20px; }
    </style>
</head>
<body class="bg-black text-white font-sans pb-20">

    <!-- Header -->
    <header class="p-6 border-b border-zinc-900">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-red-600 italic">SC COFFE</h1>
            <span class="bg-zinc-900 px-3 py-1 rounded-full text-xs font-bold">120 Pts</span>
        </div>
    </header>

    <!-- Content -->
    <main class="p-6">
        <!-- Loyalty -->
        <div class="bg-zinc-900 p-6 rounded-2xl mb-6 border border-zinc-800">
            <h2 class="text-xs uppercase font-bold text-zinc-500 mb-2">Dhibcahaaga (Loyalty)</h2>
            <div class="text-3xl font-black mb-2">4 <span class="text-sm text-zinc-600">/ 5 Koob</span></div>
            <div class="h-2 bg-black rounded-full overflow-hidden"><div class="h-full bg-red-600 w-[80%]"></div></div>
        </div>

        <!-- WAAFI Section -->
        <div class="bg-gradient-to-r from-green-900/20 to-black p-6 rounded-2xl border border-green-900/50 mb-6">
            <h3 class="font-bold flex items-center gap-2 mb-2"><i class="fas fa-shield-alt text-green-500"></i> WAAFI Payment</h3>
            <p class="text-xs text-zinc-400 mb-4">Ku bixi lacagta si fudud adigoo isticmaalaya WAAFI ama EVC Plus.</p>
        </div>

        <!-- Menu -->
        <h2 class="font-bold mb-4">Menu-ga</h2>
        <div class="space-y-3">
            <div onclick="openM('Iced Spanish Latte', '$3.50')" class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center">
                <span>Iced Spanish Latte</span>
                <button class="text-red-500 font-bold text-xs">DALBO</button>
            </div>
            <div onclick="openM('Espresso', '$1.50')" class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center">
                <span>Espresso</span>
                <button class="text-red-500 font-bold text-xs">DALBO</button>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content text-center">
            <h4 id="mT" class="text-xl font-bold mb-4"></h4>
            <p id="mQ" class="text-2xl font-black text-red-600 mb-6"></p>
            <button onclick="dalboWhatsApp()" class="w-full bg-green-600 py-3 rounded-xl font-bold text-sm mb-2">DALBO (WAAFI/EVC)</button>
            <button onclick="closeM()" class="w-full bg-zinc-800 py-3 rounded-xl font-bold text-sm">XIR</button>
        </div>
    </div>

    <script>
        let curT = ""; let curQ = "";
        function openM(t, q) { curT = t; curQ = q; document.getElementById('mT').innerText = t; document.getElementById('mQ').innerText = q; document.getElementById('modal').style.display = "block"; }
        function closeM() { document.getElementById('modal').style.display = "none"; }
        function dalboWhatsApp() {
            const lambarka = "252614909575";
            const fariin = `Dalab Cusub: ${curT} - Qiimaha: ${curQ}. Fadlan iigu soo hagaaji WAAFI.`;
            window.open(`https://wa.me/${lambarka}?text=${encodeURIComponent(fariin)}`, '_blank');
        }
    </script>
</body>
</html>
