<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Coffe | Mogadishu Hub</title>
    <link rel="icon" type="image/png" href="71795.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); }
        .modal-content { background-color: #111; margin: 15% auto; padding: 30px; border: 1px solid #dc2626; width: 90%; max-width: 500px; border-radius: 20px; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans scroll-smooth">

    <header class="fixed w-full z-50 bg-black/90 backdrop-blur-md py-4 border-b border-red-600/30">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="71795.png" class="w-10 h-10 rounded-full border border-red-600">
                <h1 class="text-2xl font-black text-red-600 italic uppercase">SC COFFE</h1>
            </div>
            <nav class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <a href="#home" class="hover:text-red-500 transition">Home</a>
                <a href="#menu" class="hover:text-red-500 transition">Menu</a>
                <a href="#contact" class="hover:text-red-500 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section id="home" class="relative h-[60vh] flex items-center justify-center text-center">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600')] bg-cover bg-center opacity-20"></div>
        <div class="relative z-10 px-6">
            <img src="71795.png" class="w-32 h-32 mx-auto mb-8 rounded-full border-2 border-red-600">
            <h2 class="text-5xl font-black italic uppercase">SC <span class="text-red-600">COFFE</span></h2>
            <p class="text-gray-400 italic">"Pure Focus, Pure Coffee"</p>
        </div>
    </section>

    <section id="menu" class="py-20 bg-black px-6">
        <div class="max-w-5xl mx-auto text-center">
            <h3 class="text-3xl font-black text-red-600 mb-12 uppercase italic">Our Special Menu (10)</h3>
            <p class="text-gray-500 mb-8 text-sm italic">Click on any coffee to see its ingredients & benefits.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <button onclick="openModal('Espresso', 'Pure concentrated coffee beans.', 'Boosts alertness and sharpens your focus.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>1. Espresso</span><span class="text-red-500 font-bold">$1.50</span></button>
                <button onclick="openModal('Cappuccino', 'Espresso, steamed milk, and thick foam.', 'Relaxing texture that calms the nerves.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>2. Cappuccino</span><span class="text-red-500 font-bold">$2.50</span></button>
                <button onclick="openModal('Caffe Latte', 'Espresso and a lot of steamed milk.', 'Gentle on the stomach, gives a warm feeling.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>3. Caffe Latte</span><span class="text-red-500 font-bold">$2.00</span></button>
                <button onclick="openModal('Iced Spanish Latte', 'Espresso, condensed milk, and cold milk.', 'Sweet and refreshing, cools down your stress.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span class="text-blue-400">4. Iced Spanish Latte</span><span class="text-red-500 font-bold">$3.50</span></button>
                <button onclick="openModal('Americano', 'Espresso with added hot water.', 'Light caffeine dose to clear mental fog.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>5. Americano</span><span class="text-red-500 font-bold">$1.50</span></button>
                <button onclick="openModal('Caramel Macchiato', 'Espresso, vanilla syrup, and caramel.', 'Sugar and coffee blend for instant happiness.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>6. Caramel Macchiato</span><span class="text-red-500 font-bold">$3.50</span></button>
                <button onclick="openModal('Mocha', 'Espresso, chocolate, and milk.', 'Chocolate releases serotonin for better mood.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>7. Caffe Mocha</span><span class="text-red-500 font-bold">$3.00</span></button>
                <button onclick="openModal('Turkish Coffee', 'Very fine ground coffee beans boiled.', 'Deep aroma that grounds your thoughts.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>8. Turkish Coffee</span><span class="text-red-500 font-bold">$1.50</span></button>
                <button onclick="openModal('Flat White', 'Micro-foamed milk over espresso.', 'Smooth and creamy for a peaceful afternoon.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span>9. Flat White</span><span class="text-red-500 font-bold">$2.50</span></button>
                <button onclick="openModal('Iced Americano', 'Espresso with cold water and ice.', 'Instant refresh for a busy mind.')" class="flex justify-between p-5 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-red-600 transition"><span class="text-blue-400">10. Iced Americano</span><span class="text-red-500 font-bold">$2.00</span></button>

            </div>
        </div>
    </section>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h4 id="modalTitle" class="text-2xl font-black text-red-600 mb-4 uppercase italic"></h4>
            <p class="text-gray-300 mb-4"><span class="text-white font-bold">Ingredients:</span> <span id="modalBody"></span></p>
            <p class="text-gray-300 italic"><span class="text-white font-bold">Brain Benefit:</span> <span id="modalBenefit"></span></p>
            <button onclick="closeModal()" class="mt-8 bg-red-600 text-white px-6 py-2 rounded-full font-bold uppercase text-xs">Close</button>
        </div>
    </div>

    <footer id="contact" class="py-20 bg-zinc-950 text-center px-6 border-t border-zinc-900">
        <div class="flex justify-center gap-8 text-3xl mb-10">
            <a href="https://x.com/Sahal24ck" target="_blank" class="text-zinc-500 hover:text-white transition"><i class="fab fa-x-twitter"></i></a>
            <a href="https://wa.me/252614909575" target="_blank" class="text-zinc-500 hover:text-green-500 transition"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p class="text-[10px] text-zinc-600 uppercase tracking-widest italic">© 2026 SC Coffe | Sahal24ck</p>
    </footer>

    <script>
        function openModal(title, body, benefit) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = body;
            document.getElementById('modalBenefit').innerText = benefit;
            document.getElementById('infoModal').style.display = "block";
        }
        function closeModal() {
            document.getElementById('infoModal').style.display = "none";
        }
    </script>
</body>
</html>
