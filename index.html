<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Coffe | Mogadishu Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="71795.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); }
        .modal-content { background-color: #111; margin: 15% auto; padding: 30px; border: 1px solid #dc2626; width: 90%; max-width: 500px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body class="bg-[#050505] text-white">
    <section class="py-20 text-center">
        <h1 class="text-4xl font-black text-red-600 mb-10">SC COFFE MENU</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 px-6 max-w-2xl mx-auto">
            <button onclick="openModal('Espresso', 'Pure coffee beans.', 'Sharpens your focus.')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl">1. Espresso</button>
            <button onclick="openModal('Cappuccino', 'Milk and espresso.', 'Relaxes your mind.')" class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl">2. Cappuccino</button>
        </div>
    </section>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h4 id="modalTitle" class="text-xl text-red-600 font-bold mb-2"></h4>
            <p id="modalBody" class="mb-2"></p>
            <p id="modalBenefit" class="italic text-gray-400 text-sm"></p>
            <button onclick="closeModal()" class="mt-4 bg-red-600 px-4 py-2 rounded">Close</button>
        </div>
    </div>

    <script>
        function openModal(t, b, f) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalBody').innerText = b;
            document.getElementById('modalBenefit').innerText = f;
            document.getElementById('infoModal').style.display = "block";
        }
        function closeModal() { document.getElementById('infoModal').style.display = "none"; }
    </script>
</body>
</html>
